name: Coverage

on:
  pull_request:
  push:
    branches:
      - main
      - '**'

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || 'test-anon-key' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Coverage summary
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const p = 'coverage/coverage-summary.json';
          if (!fs.existsSync(p)) {
            console.error('coverage-summary.json not found');
            process.exit(1);
          }

          const j = JSON.parse(fs.readFileSync(p, 'utf8'));
          const t = j.total || {};
          const pct = (k) => (typeof t[k]?.pct === 'number' ? t[k].pct : 0);
          const summary = [
            '## Coverage Report',
            'Scope: Unit/integration tests (Vitest)',
            `lines: ${pct('lines')}%`,
            `statements: ${pct('statements')}%`,
            `functions: ${pct('functions')}%`,
            `branches: ${pct('branches')}%`,
          ].join('\n');

          console.log(summary);
          if (process.env.GITHUB_STEP_SUMMARY) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `${summary}\n`);
          }
          NODE

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
