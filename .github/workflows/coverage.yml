name: Coverage

on:
  pull_request:
  push:
    branches:
      - main
      - '**'

jobs:
  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Coverage summary
        run: |
          node -e "const fs=require('fs');const p='coverage/coverage-summary.json';if(!fs.existsSync(p)){console.error('coverage-summary.json not found');process.exit(1);}const j=JSON.parse(fs.readFileSync(p,'utf8'));const t=j.total||{};const line=(k)=>`${k}: ${t[k]?.pct ?? 0}%`;const summary=['## Coverage Report',line('lines'),line('statements'),line('functions'),line('branches')].join('\n');console.log(summary);fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,summary+'\n');"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: error
