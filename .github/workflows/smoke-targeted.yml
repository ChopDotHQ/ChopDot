name: Smoke (Targeted)

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  detect:
    name: Detect Smoke Scope
    runs-on: ubuntu-latest
    outputs:
      core_changed: ${{ steps.filter.outputs.core }}
      guest_changed: ${{ steps.filter.outputs.guest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            core:
              - 'src/components/AppRouter.tsx'
              - 'src/components/screens/AddExpense.tsx'
              - 'src/components/screens/CreatePot.tsx'
              - 'src/components/screens/ExpenseDetail.tsx'
              - 'src/components/screens/PotHome.tsx'
              - 'src/components/screens/SettleHome.tsx'
              - 'src/hooks/**'
              - 'src/nav.ts'
              - 'src/services/**'
              - 'src/types/**'
              - 'src/utils/settlements.ts'
            guest:
              - 'src/components/AppRouter.tsx'
              - 'src/components/auth/**'
              - 'src/components/screens/AddMember.tsx'
              - 'src/components/screens/AuthScreen.tsx'
              - 'src/components/screens/MembersTab.tsx'
              - 'src/nav.ts'
              - 'src/services/**'

      - name: Echo scope
        run: |
          echo "core_changed=${{ steps.filter.outputs.core }}"
          echo "guest_changed=${{ steps.filter.outputs.guest }}"

  smoke-core:
    name: Targeted Smoke (Core, Required)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.core_changed == 'true'
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || 'test-anon-key' }}
      SMOKE_SUITE: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run targeted smoke suite
        run: npm run ci:smoke:targeted

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-core-artifacts-${{ github.run_id }}
          path: |
            artifacts/SMOKE_*.md
            output/playwright/**
          if-no-files-found: ignore

  smoke-guest:
    name: Targeted Smoke (Guest, Informational)
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.guest_changed == 'true'
    continue-on-error: true
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL || 'https://example.supabase.co' }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY || 'test-anon-key' }}
      SMOKE_SUITE: guest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run guest smoke suite (informational)
        run: npm run ci:smoke:targeted

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-guest-artifacts-${{ github.run_id }}
          path: |
            artifacts/SMOKE_*.md
            output/playwright/**
          if-no-files-found: ignore
