# Secret scanning - prevents committing credentials
name: Secrets Scan

on:
  pull_request:
  push:
    branches:
      - main
      - 12-23-feat_add_usdc_implementation

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks CLI
        run: |
          set -euo pipefail
          GITLEAKS_VERSION="8.24.2"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        run: |
          set -euo pipefail
          gitleaks dir . --config=.gitleaks.toml --gitleaks-ignore-path=.gitleaksignore --redact --verbose --exit-code=1
