name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 12-23-feat_add_usdc_implementation

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn run lint

      - name: Type check
        run: yarn run type-check

      - name: Unit tests
        run: yarn run vitest run

      - name: Build
        run: yarn run build
