version: "3.8"

services:
  # Local EVM chain for rapid contract development/testing.
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: chopdot-anvil
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    restart: unless-stopped

  # Optional local Polkadot-compatible dev node (for cross-chain roadmap work).
  # Set REVIVE_DEV_NODE_IMAGE to a pinned version in CI.
  polkadot-dev:
    image: ${REVIVE_DEV_NODE_IMAGE:-parity/polkadot:latest}
    container_name: chopdot-polkadot-dev
    command: ["--dev", "--rpc-external", "--rpc-cors=all", "--rpc-methods=unsafe"]
    ports:
      - "9944:9944"
      - "9933:9933"
    restart: unless-stopped
    profiles:
      - polkadot
